<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #fff;
    }
    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <model-viewer
      src="https://raw.githubusercontent.com/AnatolyBerezkin/3dmodels/main/RamWithWormGear2L-3.glb"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="0.4"
      alt="3D model">
  </model-viewer>
</body>
</html>
